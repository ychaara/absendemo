buildscript {
     ext.kotlin_version = '1.8.10'  // Ganti dari 1.9.20 ke 1.8.10
    repositories {
        google()
        mavenCentral()
    }
     dependencies {
        classpath 'com.android.tools.build:gradle:8.2.1' // Pastikan versi sesuai
    }
} 

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}


